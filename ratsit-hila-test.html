  {sp:'B',p:'Beseder, toda. Ve-ata?',h:'בְּסֵדֶר, תּוֹדָה. וְאַתָה?',n:'Goed, dank je. En jij?'},
  {sp:'A',p:'Gam ani beseder. Yesh lecha zman?',h:'גַּם אֲנִי בְּסֵדֶר. יֵשׁ לְךָ זְמַן?',n:'Ik ook goed. Heb jij tijd?'},
  {sp:'B',p:'Ken, yesh li zman. Ma ata rotze?',h:'כֵּן, יֵשׁ לִי זְמַן. מָה אַתָה רוֹצֶה?',n:'Ja, ik heb tijd. Wat wil jij?'}
],
song:{t:'Liedje les 33',lines:[
    {p:'Shalom, shalom, ani lomed Ivrit.',h:'שָׁלוֹם, שָׁלוֹם, אֲנִי לוֹמֵד עִבְרִית.',n:'Hallo hallo, ik leer Ivriet.'},
    {p:'Kol yom ani medaber, kol yom ani shomea.',h:'כָּל יוֹם אֲנִי מְדַבֵּר, כָּל יוֹם אֲנִי שׁוֹמֵעַ.',n:'Elke dag spreek ik, elke dag hoor ik.'},
    {p:'Ata rotze? Ani rotze! Kulanu rotzim!',h:'אַתָה רוֹצֶה? אֲנִי רוֹצֶה! כֻּלָּנוּ רוֹצִים!',n:'Jij wil? Ik wil! Wij willen allemaal!'},
    {p:'Ivrit yafa, Ivrit tova, Ivrit sheli!',h:'עִבְרִית יָפָה, עִבְרִית טוֹבָה, עִבְרִית שֶׁלִּי!',n:'Ivriet is mooi, Ivriet is goed, mijn Ivriet!'}
  ]},

var AZURE_KEY = ['5a4gnryxxTkYqP','kgI99TASdEBpUy','VjTSFJDwCFF6Xe','r2tDFpbyNFJQQJ','99CDACYeBjFXJ3','w3AAAYACOGF9mA'].join('');
var SS = window.speechSynthesis || null;
var AZURE_REGION = 'eastus';
var curRate = parseFloat(localStorage.getItem('iv65_rate') || '1.0');
var stopFlag = false;
var curSynth = null;

// Detecteer geslacht op basis van tekst/context
function isVrouwelijk(text) {
  if (!text) return false;
  var t = text.toLowerCase();
  // Vrouwelijke eindingen in Hebreeuws transliteratie
  if (t.match(/(rotza|rotzt|tzricha|yechola|rotzot|yecholot|ani v|jij v|zij|v sg|v pl|vrouw)/)) return true;
  return false;
}

function getVoice(text, forceVoice) {
  if (forceVoice) return forceVoice;
  return isVrouwelijk(text) ? 'he-IL-HilaNeural' : 'he-IL-AvriNeural';
}


function stripNikud(text) {
  // Verwijder nikud (vocaaltekens U+05B0-U+05C7) maar behoud letters en spaties
  return text.replace(/[ְ-ׇ]/g, '');
}




function speak(text, rate, cb, voice) {
  if (!text) { if (cb) cb(); return; }
  stopFlag = false;
  stopAudio();
  var v = getVoice(text, voice);
  var ssml = '<speak version="1.0" xmlns="http://www.w3.org/2001/10/synthesis" xml:lang="he-IL">'
    + '<voice name="' + v + '">'
    + '<prosody rate="' + (curRate < 0.8 ? 'slow' : curRate < 0.95 ? 'medium' : 'fast') + '">'
    + text
        .replace(/רָצִית/g, 'רָצִיט')
        .replace(/קָנִית/g, 'קָנִיט')
        .replace(/רָאִית/g, 'רָאִיט')
        .replace(/הָיִית/g, 'הָיִיט')
        .replace(/הָלַכְתְּ/g, 'הָלַכְטְ')
        .replace(/שָׁמַעְתְּ/g, 'שָׁמַעְטְ')
    + '</prosody></voice></speak>';
  try {
    var config = SpeechSDK.SpeechConfig.fromSubscription(AZURE_KEY, AZURE_REGION);
    config.speechSynthesisVoiceName = v;
    var player = new SpeechSDK.SpeakerAudioDestination();
    var audioConfig = SpeechSDK.AudioConfig.fromSpeakerOutput(player);
    curSynth = new SpeechSDK.SpeechSynthesizer(config, audioConfig);
    curSynth.speakSsmlAsync(
      ssml,
      function(result) {
        if (curSynth) { try { curSynth.close(); } catch(e) {} curSynth = null; }
        if (cb && !stopFlag) cb();
      },
      function(err) {
        if (curSynth) { try { curSynth.close(); } catch(e) {} curSynth = null; }
        if (cb) cb();
      }
    );
  } catch(e) {
    if (cb) setTimeout(cb, 200);
  }
}


function speakM(text, cb) { speak(text, curRate, cb, 'he-IL-AvriNeural'); }

function speakV(text, cb) { speak(text, curRate, cb, 'he-IL-HilaNeural'); }

function stopAudio() {
  stopFlag = true;
  if (curSynth) { try { curSynth.close(); } catch(e) {} curSynth = null; }
}
function testSpeak(text) {
  document.getElementById('st').textContent = 'Afspelen: ' + text;
  speak(text, 1.0, function() {
    document.getElementById('st').textContent = 'Klaar: ' + text;
  }, 'he-IL-HilaNeural');
}
