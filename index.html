<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stemmen Test</title>
<script src="https://code.responsivevoice.org/responsivevoice.js?key=FREE"></script>
<style>
body { font-family: sans-serif; padding: 16px; background: #f0f4f3; max-width: 500px; margin: 0 auto; }
h2 { color: #1a7a6e; }
h3 { color: #888; font-size: 11px; margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 1px; }
.stem { background: white; border-radius: 12px; padding: 12px; margin: 6px 0; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
.sn { font-weight: 700; font-size: 15px; margin-bottom: 8px; }
.zinnen { display: flex; flex-direction: column; gap: 6px; }
button { background: #1a7a6e; color: white; border: none; border-radius: 8px; padding: 9px 12px; font-size: 13px; cursor: pointer; text-align: left; }
button.stop { background: #c0392b; width: 100%; padding: 12px; font-size: 15px; margin: 8px 0; text-align: center; }
#status { font-size: 13px; color: #444; margin: 8px 0; padding: 10px; background: white; border-radius: 8px; }
</style>
</head>
<body>
<h2>Hebrew Stemmen Test</h2>
<div id="status">Kies een stem om te testen</div>
<button class="stop" onclick="responsiveVoice.cancel()">&#9632; Stop</button>

<h3>Hebrew Female</h3>
<div class="stem">
<div class="sn">Hebrew Female ♀</div>
<div class="zinnen">
  <button onclick="t('Hebrew Female',1)">&#128266; שָׁלוֹם, מַה שְׁלוֹמְךָ — Shalom, hoe gaat het?</button>
  <button onclick="t('Hebrew Female',2)">&#128266; אֲנִי רוֹצָה לִלְמֹד עִבְרִית — Ik wil Ivriet leren</button>
  <button onclick="t('Hebrew Female',3)">&#128266; יוֹם טוֹב, אֵיךְ קוֹרְאִים לָךְ — Goedendag, hoe heet jij?</button>
  <button onclick="t('Hebrew Female',4)">&#128266; תּוֹדָה רַבָּה, לְהִתְרָאוֹת — Dank je wel, tot ziens</button>
</div>
</div>

<h3>Snelheid (Hebrew Female)</h3>
<div class="stem">
<div class="sn">Spreeksnelheid</div>
<div class="zinnen">
  <button onclick="ts(0.5)">&#128266; Heel langzaam (0.5)</button>
  <button onclick="ts(0.7)">&#128266; Langzaam (0.7)</button>
  <button onclick="ts(0.9)">&#128266; Normaal (0.9)</button>
  <button onclick="ts(1.0)">&#128266; Snel (1.0)</button>
</div>
</div>

<script>
var ZINNEN = {
  1: '\u05E9\u05B8\u05DC\u05D5\u05B9\u05DD, \u05DE\u05B7\u05D4 \u05E9\u05B0\u05DC\u05D5\u05B9\u05DE\u05B0\u05DA\u05BE',
  2: '\u05D0\u05B2\u05E0\u05B4\u05D9 \u05E8\u05D5\u05B9\u05E6\u05B8\u05D4 \u05DC\u05B4\u05DC\u05DE\u05B9\u05D3 \u05E2\u05B4\u05D1\u05E8\u05B4\u05D9\u05EA',
  3: '\u05D9\u05D5\u05B9\u05DD \u05D8\u05D5\u05B9\u05D1, \u05D0\u05B5\u05D9\u05DA \u05E7\u05D5\u05B9\u05E8\u05D0\u05B4\u05D9\u05DD \u05DC\u05B8\u05DA\u05BE',
  4: '\u05EA\u05BC\u05D5\u05B9\u05D3\u05B8\u05D4 \u05E8\u05B7\u05D1\u05B8\u05BC\u05D4, \u05DC\u05B0\u05D4\u05B4\u05EA\u05E8\u05D0\u05D5\u05B9\u05EA'
};

function t(stem, zin) {
  responsiveVoice.cancel();
  document.getElementById('status').textContent = 'Speelt: ' + stem;
  responsiveVoice.speak(ZINNEN[zin], stem, {
    rate: 0.8,
    onend: function() { document.getElementById('status').textContent = 'Klaar'; }
  });
}

function ts(rate) {
  responsiveVoice.cancel();
  document.getElementById('status').textContent = 'Snelheid: ' + rate;
  responsiveVoice.speak(ZINNEN[1] + ' ' + ZINNEN[2], 'Hebrew Female', {
    rate: rate,
    onend: function() { document.getElementById('status').textContent = 'Klaar'; }
  });
}
</script>
</body>
</html>
