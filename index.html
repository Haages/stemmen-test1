<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stem test</title></head>
<body style="font-family:sans-serif;padding:20px;max-width:500px">
<h2>Welke zegt ratzit correct?</h2>

<div style="margin:12px 0;padding:14px;background:#ffeaa7;border-radius:8px">
  <b>&#9794; Avri &#8212; רָצִיט (tet)</b><br>
  <button id="b1" style="margin-top:8px;padding:12px;background:#3498db;color:white;border:none;border-radius:8px;font-size:18px;cursor:pointer;width:100%">Speel af</button>
</div>
<div style="margin:12px 0;padding:14px;background:#ffb3c6;border-radius:8px">
  <b>&#9792; Hila &#8212; רָצִיט (tet)</b><br>
  <button id="b2" style="margin-top:8px;padding:12px;background:#e84393;color:white;border:none;border-radius:8px;font-size:18px;cursor:pointer;width:100%">Speel af</button>
</div>
<div style="margin:12px 0;padding:14px;background:#dfe6e9;border-radius:8px">
  <b>&#9792; Hila &#8212; רָצִית (tav)</b><br>
  <button id="b3" style="margin-top:8px;padding:12px;background:#636e72;color:white;border:none;border-radius:8px;font-size:18px;cursor:pointer;width:100%">Speel af</button>
</div>
<div id="st" style="margin-top:16px;padding:12px;background:#f8f9fa;border-radius:8px">Klik een knop...</div>

<script src="https://cdn.jsdelivr.net/npm/microsoft-cognitiveservices-speech-sdk@latest/distrib/browser/microsoft.cognitiveservices.speech.sdk.bundle-min.js"></script>
<script>
var AZURE_KEY = ['5a4gnryxxTkYqP','kgI99TASdEBpUy','VjTSFJDwCFF6Xe','r2tDFpbyNFJQQJ','99CDACYeBjFXJ3','w3AAAYACOGF9mA'].join('');
var AZURE_REGION = 'eastus';
var curSynth = null;

function playWord(text, voice) {
  document.getElementById('st').textContent = 'Afspelen: ' + voice;
  if (curSynth) { try { curSynth.close(); } catch(e) {} curSynth = null; }
  var config = SpeechSDK.SpeechConfig.fromSubscription(AZURE_KEY, AZURE_REGION);
  var audio = SpeechSDK.AudioConfig.fromDefaultSpeakerOutput();
  curSynth = new SpeechSDK.SpeechSynthesizer(config, audio);
  curSynth.speakTextAsync(text,
    function(r) { curSynth.close(); curSynth = null; document.getElementById('st').textContent = 'Klaar: ' + voice; },
    function(e) { curSynth.close(); curSynth = null; document.getElementById('st').textContent = 'Fout: ' + e; }
  );
}

document.getElementById('b1').onclick = function() { playWord('רָצִיט', 'he-IL-AvriNeural'); };
document.getElementById('b2').onclick = function() { playWord('רָצִיט', 'he-IL-HilaNeural'); };
document.getElementById('b3').onclick = function() { playWord('רָצִית', 'he-IL-HilaNeural'); };
</script>
</body></html>
